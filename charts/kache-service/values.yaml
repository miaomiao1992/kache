nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: zondax/kache
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

planner:
  name: planner
  dbPath: /var/lib/kache/planner.db
  seedStateFile: ""
  persistence:
    enabled: true
    type: ephemeral
    mountPath: /var/lib/kache
    size: 10Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

auth:
  existingSecret: ""
  existingSecretKey: token

logLevel: "kache_service=info"

service:
  type: ClusterIP
  port: 8080
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

extraEnv: []

nodeSelector: {}
tolerations: []
affinity: {}
