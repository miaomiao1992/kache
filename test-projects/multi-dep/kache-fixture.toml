# kache-e2e fixture: pure-Rust workspace with serde/serde_json deps.
#
# Exercises the rustc wrapper in its straight-line case: many crates,
# all cacheable, no FFI side-channels. The cold/warm/noop lifecycle
# verifies populate, restore, and incremental no-op respectively.

name = "multi-dep"

[env]
RUSTC_WRAPPER = "$KACHE"
# Wire CC/CXX too so any -sys crate that sneaks into the dep graph
# also flows through kache (harmless when nothing invokes them).
CC  = "$KACHE cc"
CXX = "$KACHE c++"

[commands]
build = "cargo build --release"
clean = "rm -rf target"

[verify]
run = "./target/release/multi-dep"
expected_stdout_contains = ["kache-test", "version"]
# Defense-in-depth for multi-prefix --remap-path-prefix (PR #74). A
# correctly-built binary embeds source path strings only via stable
# sentinels (`<CARGO_HOME>/...`, `<HOME>/...`, etc.). If a regression
# ever drops the multi-prefix injection or breaks the sentinel
# substitution, the binary would carry machine-local prefixes
# instead — `strings <bin> | grep` on these would fire, failing
# verify before the bug ships.
forbidden_substrings = [
    "/Users/",
    "/home/",
    "/private/tmp/",
    "/private/var/",
]

[assertions.cold]
# Cold build must populate the cache; serde + transitive deps means
# this should comfortably exceed a handful of entries.
min_entries_after = 1

[assertions.warm]
# Every crate from cold should restore from cache on warm.
min_hits = 1
min_hit_rate_pct = 50.0

[assertions.noop]
# Cargo prints `Compiling <crate>` only when it actually recompiles.
# A no-op rebuild after a successful warm build must not print it.
should_not_recompile = true
recompile_marker = "Compiling"

# Same source built from a *different* absolute path with the same
# cache. EXPECTED TO FAIL today: rustc cache keys leak the build
# directory into the hash, so a relocated build misses some entries
# even though the source is byte-identical. PR3 (PathNormalizer)
# will make this pass by stripping machine-local prefixes.
#
# The contract is strict: same source → must hit EVERY cached entry
# (max_misses = 0). Loose thresholds like `min_hit_rate_pct = 50`
# would not catch the bug — a few leaked path components per crate
# can still leave the bulk hitting cleanly. Strict zero-miss makes
# the leak unambiguous.
#
# Keeping the assertion declared now means: (a) the bug class is
# visible end-to-end, not just in a unit test; (b) the day PR3
# lands, this fixture is the regression guard for free.
[assertions.relocate]
min_hits = 1
max_misses = 0
