name: Service Image

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/kache-service/**"
      - "docker/**"
      - "docker-bake.hcl"
      - "Justfile"
      - ".github/workflows/service-image.yml"
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/kache-service/**"
      - "docker/**"
      - "docker-bake.hcl"
      - "Justfile"
      - ".github/workflows/service-image.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-dry-run:
    if: github.event_name == 'pull_request'
    name: Build Service Image (Dry Run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (dry-run, no cache)
        run: docker buildx bake -f docker-bake.hcl --set '*.cache-from=' service

  release:
    if: github.event_name != 'pull_request'
    name: Build Service Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            IMAGE_TAG="${VERSION}"
            BUILD_VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="0.0.0"
            IMAGE_TAG="dev"
            BUILD_VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Push service image
        env:
          REGISTRY: zondax
          VERSION: ${{ steps.meta.outputs.version }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          BUILD_VERSION: ${{ steps.meta.outputs.build_version }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: just image-service-release
